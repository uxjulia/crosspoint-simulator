# This needs to be added to the bottom of your Platformio.ini file
#
# macOS (Apple Silicon) defaults are enabled. Comment out if using Linux or WSL, and make sure to install SDL2 and OpenSSL dev packages on Linux (e.g. sudo apt install libsdl2-dev libssl-dev).
# Linux/WSL changes are marked with [Linux] and shown commented out below.

[env:simulator]
platform = native
build_flags =
  -std=gnu++2a
  -arch arm64           # macOS Apple Silicon only — omit on Linux [Linux]
  -I/opt/homebrew/include  # macOS Homebrew (verify this path for your system) — omit on Linux (apt SDL2 uses system paths) [Linux]
  -L/opt/homebrew/lib      # macOS Homebrew (verify this path for your system) — omit on Linux [Linux]
  -lSDL2
  # -lssl -lcrypto            # [Linux] OpenSSL for MD5Builder (requires: sudo apt install libssl-dev)
  # -Wno-deprecated-declarations  # [Linux] suppress OpenSSL 3.x MD5 deprecation warnings
  # -Wno-narrowing  # [Linux] GCC equivalent of -Wno-c++11-narrowing (Clang-only)
  -DSIMULATOR
  -DCROSSPOINT_VERSION=\"dev-simulator\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -DUSE_UTF8_LONG_NAMES=1
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
lib_ignore = hal, PNGdec, JPEGDEC
extra_scripts =
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/build_html.py
  scripts/run_simulator.py
lib_deps =
  simulator_mock=https://github.com/uxjulia/crosspoint-simulator
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ ^0.0.1
  links2004/WebSockets @ 2.7.3