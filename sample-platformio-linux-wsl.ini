# Linux/WSL sample for adding the simulator to your firmware's platformio.ini.
# Debian/Ubuntu/WSL dependencies: sudo apt install libsdl2-dev libssl-dev
# This sample is self-contained for builds. If you also want the PlatformIO
# IDE task entry "Run Simulator", make the consuming project own task
# registration:
#   custom_run_simulator_target_owner = project
#   post:.pio/libdeps/$PIOENV/simulator/run_simulator_project.py
# under extra_scripts in the consuming firmware repo.

[env:simulator]
platform = native
; Optional native JPEG/PNG decoder mode:
; - add -DMARGINALIA_SIM_USE_NATIVE_DECODERS under build_flags
; - uncomment lib_compat_mode = off
; - change lib_ignore to: hal, WebSockets
; - uncomment the PNGdec/JPEGDEC entries under lib_deps
; lib_compat_mode = off
; Uncomment when you also add the optional project-side hook below.
; custom_run_simulator_target_owner = project
build_src_filter =
  +<*>
  ; Keep these exclusions for the current inherited firmware layout. The
  ; simulator library supplies host-backed equivalents or safe no-op shims.
  -<network/CrossPointWebServer.cpp>
  -<network/FirmwareFlasher.cpp>
  -<network/OtaBootSwitch.cpp>
  -<network/OtaUpdater.cpp>
  -<network/WebDAVHandler.cpp>
  -<platform/skip_efuse_blk_check.c>
build_flags =
  -std=gnu++2a
  !sdl2-config --cflags --libs
  -lssl
  -lcrypto
  -Wno-deprecated-declarations
  -Wno-narrowing
  -DSIMULATOR
  -DMARGINALIA_SIMULATOR
  -DCROSSPOINT_VERSION=\"1.2.0-simulator\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -DUSE_UTF8_LONG_NAMES=1
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
  -Isrc
  ; Uncomment to simulate the X3's 792x528 panel, X3-only firmware paths,
  ; and the X3 tilt sensor.
  ; -DSIMULATOR_DEVICE_X3
  ; -DMARGINALIA_SIM_USE_NATIVE_DECODERS
  ; -Dmemcpy_P=memcpy ; For native JPEGDEC
lib_ignore = hal, PNGdec, JPEGDEC
extra_scripts =
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/build_html.py
  ; Optional IDE task exposure:
  ; post:.pio/libdeps/$PIOENV/simulator/run_simulator_project.py
lib_deps =
  simulator=https://github.com/marginalia-os/marginalia-simulator
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ ^0.0.1
  ; Native decoder opt-in only:
  ; bitbank2/PNGdec @ ^1.0.0
  ; https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3
